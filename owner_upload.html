<html>
<head>
<title>GeneNFT | Upload Genome Dataset</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#eef2f7,#e3ecff);
}

/* ===== SIDEBAR ===== */
.sidebar{
    position:fixed;
    width:230px;
    height:100%;
    background: linear-gradient(180deg,#0f4c81,#1e6fd9,#2c9cff);
    color:white;
    padding-top:25px;
}
.sidebar h2{
    text-align:center;
    margin-bottom:40px;
    font-weight:600;
}
.sidebar a{
    display:flex;
    align-items:center;
    gap:10px;
    color:white;
    padding:14px 25px;
    text-decoration:none;
    transition:0.3s;
    font-size:14px;
}
.sidebar a:hover{
    background:rgba(255,255,255,0.15);
    padding-left:35px;
    border-left:4px solid white;
}

/* ===== TOPBAR ===== */
.topbar{
    position:fixed;
    left:230px;
    right:0;
    height:70px;
    background:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    box-shadow:0 3px 15px rgba(0,0,0,0.08);
}
.topbar h3{
    margin:0;
    font-weight:600;
    color:#2c3e50;
}

/* ===== MAIN ===== */
.main{
    margin-left:230px;
    padding:110px 30px 40px;
}

/* ===== CARD ===== */
.card{
    background:white;
    border-radius:16px;
    padding:30px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    border-top:4px solid #2c9cff;
    transition:0.3s;
}
.card:hover{
    transform:translateY(-5px);
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

.profile-menu{
    display:flex;
    align-items:center;
    gap:15px;
}

.profile-name{
    font-weight:500;
    color:#2c3e50;
}

.logout-btn{
    background:#ff4d4d;
    color:white;
    padding:8px 15px;
    border-radius:20px;
    text-decoration:none;
    font-size:14px;
    transition:.3s;
}
/* ===== FORM ===== */
label{
    font-weight:500;
    margin-top:15px;
    display:block;
    font-size:14px;
}
input, select, textarea{
    width:100%;
    padding:10px 12px;
    margin-top:6px;
    border:1px solid #ddd;
    border-radius:8px;
    font-family:'Poppins';
    transition:0.3s;
}
input:focus, select:focus, textarea:focus{
    border-color:#2c9cff;
    outline:none;
    box-shadow:0 0 0 3px rgba(44,156,255,0.15);
}

/* Analysis checkboxes */
.analysis-types{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    margin-top:10px;
}
.analysis-types label{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13px;
    font-weight:400;
}

/* Submit button */
button{
    background:linear-gradient(90deg,#1e6fd9,#2c9cff);
    color:white;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:15px;
    margin-top:20px;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    background:linear-gradient(90deg,#0f4c81,#1e6fd9);
    transform:translateY(-2px);
}

/* Alerts */
.alert{
    padding:10px;
    border-radius:8px;
    margin-bottom:15px;
    font-size:14px;
}
.success{
    background:#eafaf1;
    color:#27ae60;
}
.error{
    background:#fdecea;
    color:#e74c3c;
}

/* Section title */
.section-title{
    font-size:18px;
    font-weight:600;
    margin-bottom:20px;
    color:#2c3e50;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2><i class="fa fa-dna"></i> GeneNFT</h2>
    <a href="/owner_home"><i class="fa fa-chart-line"></i> Dashboard</a>
    <a href="/owner_key"><i class="fa fa-key"></i> Key Management</a>
    <a href="/owner_upload"><i class="fa fa-upload"></i> Upload Genome</a>
    <a href="/owner_files"><i class="fa fa-folder-open"></i> My Uploads</a>
    <a href="/owner_requests"><i class="fa fa-coins"></i> Data Requests</a>
    <a href="/owner_block"><i class="fa fa-shield-alt"></i> Integrity Verification</a>
	<a href="/logout"><i class="fa fa-sign-out-alt"></i> Logout</a>
</div>

<!-- TOPBAR -->
<div class="topbar">
    <h3>Data Owner Dashboard</h3>

    <div class="profile-menu">
        <span class="profile-name">
            <i class="fa fa-user-circle"></i> {{ data[1] }}
        </span>
        <a href="/logout" class="logout-btn">
            <i class="fa fa-sign-out-alt"></i> Logout
        </a>
    </div>
</div>

<!-- MAIN -->
<div class="main">
<div class="card">

<div class="section-title">
    <i class="fa fa-database"></i> Dataset Information
</div>

{% if msg=="success" %}
<div class="alert success">Genome Dataset Uploaded Successfully ??</div>
<script>
setTimeout(function () {
   window.location.href= '/owner_files';
}, 2000);
</script>
{% endif %}

{% if msg=="fail" %}
<div class="alert error">Public Key Invalid</div>
{% endif %}

<form method="POST" enctype="multipart/form-data">

<label>Dataset Title</label>
<input type="text" name="title" placeholder="e.g., Anitha_WGS_2026" required>

<label>Description</label>
<textarea name="description" rows="3" placeholder="Whole Genome Sequence Data" required></textarea>

<label>Allowed Analysis Types</label>
<div class="analysis-types">
  <label><input type="checkbox" name="allowed_analysis" value="All" id="all_types"> All</label>
  <label><input type="checkbox" name="allowed_analysis" value="Cancer"> Cancer</label>
  <label><input type="checkbox" name="allowed_analysis" value="Diabetes"> Diabetes</label>
  <label><input type="checkbox" name="allowed_analysis" value="Cardiovascular"> Cardiovascular</label>
  <label><input type="checkbox" name="allowed_analysis" value="Neurological"> Neurological</label>
</div>

<label>Price per Analysis (&#8377;)</label>
<input type="text" name="price" placeholder="" required>

<label>Ethnicity</label>
<select name="ethnicity" required>
  <option value="">Select Ethnicity</option>
  <option>Asian</option>
  <option>Caucasian</option>
  <option>African</option>
  <option>Hispanic</option>
  <option>Middle Eastern</option>
  <option>Other</option>
</select>

<label>Genome File (FASTQ)</label>
<input type="file" name="genome_file" required>

<label>Public Key</label>
<input type="text" name="public_key" placeholder="Enter your public key" required>

<label style="margin-top:15px;">
<input type="checkbox" name="consent" value="approved" required>
 Consent Approved for Data Sharing
</label>

<button type="submit">
    <i class="fa fa-lock"></i> Upload & Encrypt
</button>

</form>

</div>
</div>

</body>
</html>
